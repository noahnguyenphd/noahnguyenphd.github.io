<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Huan (Noah) Nguyen, MBA, MSc, PMP®</title>
    <link rel="icon" type="image/svg+xml" href="favicon-maroon.svg">
    <!-- <link rel="alternate icon" type="image/svg+xml" href="favicon-orange.svg"> -->
    <!-- <link rel="alternate icon" type="image/x-icon" href="favicon.ico"> -->

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css?v1.14">
</head>
<body>
    <!-- Shared Header -->
    <div id="site-header"></div>

    <!-- Main Content -->
    <div class="main-content">
        <section class="cv">
            <div id="loading-spinner" class="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
            <div class="cv-container hidden" id="cv-container">
                <iframe
                    id="cv-iframe"
                    title="Resume of Huan H. Nguyen"
                    src="https://drive.google.com/file/d/1-PWpUFw1HLDIFezl9UJqdktbX2PMOcJl/preview"
                    allow="autoplay"
                ></iframe>
            </div>
        </section>
    </div>

    <!-- Shared Footer -->
    <div id="site-footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <script>
        // Handle iframe loading
        const iframe = document.getElementById('cv-iframe');
        const spinner = document.getElementById('loading-spinner');
        const cvContainer = document.getElementById('cv-container');

        iframe.addEventListener('load', function() {
            spinner.style.display = 'none';
            cvContainer.classList.remove('hidden');
        });
    </script>
</body>
</html>
